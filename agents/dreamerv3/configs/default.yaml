# --- Training loop (InterleavedTrainer) ---
trainer: interleaved
total_env_steps: 100000       # Atari 100k = 100K agent steps
seed_steps: 1024              # 用 random policy 預填 buffer
batch_size: 16
seq_len: 64
train_ratio: 1                # gradient steps per env step

# --- Replay buffer ---
buffer_capacity: 1000000
min_episode_len: 2

# --- Environment ---
num_envs: 1                   # 平行收集的 env 數量
obs_key: image

# --- Optimizer (single optimizer, DreamerV3 style) ---
lr: 1.0e-4
beta1: 0.9
beta2: 0.999
eps: 1.0e-20
agc: 0.3                     # adaptive gradient clipping threshold

# --- Agent architecture ---
discrete: true                # discrete action space
horizon: 333
contdisc: true                # continue discount

# --- World model kwargs (forwarded to DreamerWorldModel) ---
wm_kwargs:
  h_dim: 4096
  stoch: 32
  classes: 32
  rssm_blocks: 8
  rssm_hidden: 2048
  enc_depth: 64
  enc_mults: [2, 3, 4, 4]
  enc_kernel: 5
  img_size: [64, 64]
  dec_depth: 64
  dec_mults: [2, 3, 4, 4]
  dec_kernel: 5
  units: 1024
  head_layers: 5
  reward_bins: 255
  dyn_scale: 1.0
  rep_scale: 0.1
  free_nats: 1.0
  reward_grad: false
  norm: rms
  act: silu
  outscale: 1.0

# --- Actor-critic kwargs ---
ac_kwargs:
  policy_layers: 5
  value_layers: 5
  policy_units: 1024
  value_units: 1024
  imag_horizon: 15
  gamma: 0.997
  lambda_: 0.95
  entropy_scale: 3.0e-4
  slow_target_fraction: 0.02
  slow_target_update: 1

# --- Loss scales ---
loss_scales:
  dyn: 1.0
  rep: 0.1
  rec: 1.0
  rew: 1.0
  con: 1.0
  policy: 1.0
  value: 1.0
  repval: 0.0                # 0 = 不啟用 replay value loss