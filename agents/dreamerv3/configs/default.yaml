trainer: interleaved
total_env_steps: 100000
seed_steps: 1024
batch_size: 16
seq_len: 64
train_ratio: 256
 
# --- Replay buffer ---
buffer_capacity: 1000000
min_episode_len: 2
 
# --- Environment ---
num_envs: 1
obs_key: image
 
# --- Optimizer ---
lr: 4.0e-5
beta1: 0.9
beta2: 0.999
eps: 1.0e-20
agc: 0.3
 
# --- Agent top-level ---
discrete: true
horizon: 333
contdisc: true
 
# --- Gradient flow ---
ac_grads: false  
reward_grad: true
repval_loss: true
repval_grad: true
 
# --- Logging ---
log_every: 1000
eval_every: 10000
eval_episodes: 10
checkpoint_every: 25000
log_dir: runs
 
# --- Compute ---
compute_dtype: bfloat16
use_compile: true
compile_mode: reduce-overhead
 
wm_kwargs:
  h_dim: 8192
  stoch: 32
  classes: 64
  rssm_blocks: 8
  rssm_hidden: 1024
 
  # Encoder
  enc_depth: 64
  enc_mults: [2, 3, 4, 4]
  enc_kernel: 5
  img_size: [64, 64]
 
  # Decoder
  dec_depth: 64
  dec_mults: [2, 3, 4, 4]
  dec_kernel: 5
 
  # MLP / Head
  units: 1024
  head_layers: 1
  reward_bins: 255
 
  # Loss
  dyn_scale: 1.0
  rep_scale: 0.1
  free_nats: 1.0
 
  # Network config
  norm: rms                    # rms | layer | none
  act: silu                    # silu | gelu | relu | mish | tanh | none
  outscale: 1.0
 
ac_kwargs:
  # Network
  units: 1024
  layers: 3
  bins: 255
  norm: rms
  act: silu
 
  # Policy
  policy_outscale: 0.01
  policy_unimix: 0.01
  actent: 3.0e-4
  minstd: 0.1
  maxstd: 1.0
 
  # Value
  value_outscale: 0.0
  slow_decay: 0.98
  slowreg: 1.0
  slowtar: false
 
  # Returns
  lam: 0.95
 
  # Normalization
  retnorm_decay: 0.99
  retnorm_limit: 1.0
  retnorm_plow: 5.0
  retnorm_phigh: 95.0
  valnorm_decay: 0.99
  advnorm_decay: 0.99
  valnorm_enable: false
  advnorm_enable: false
 
loss_scales:
  dyn: 1.0
  rep: 0.1
  rec: 1.0
  rew: 1.0
  con: 1.0
  policy: 1.0
  value: 1.0
  repval: 0.3