total_env_steps: 100000
 
# --- Environment wrappers (forwarded to make_atari) ---
env:
  action_repeat: 4
  max_noop: 0
  sticky_prob: 0.0
  fire_reset: false
  life_loss_terminal: false
  reward_clip: null
  reward_scale: 1.0
  grayscale: true
  resize: [64, 64]
  frame_stack: 1
  max_episode_steps: 108000   # 108000 env frames = 27000 agent steps
  obs_key: image